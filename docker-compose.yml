services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sketch-notes-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  node_modules: